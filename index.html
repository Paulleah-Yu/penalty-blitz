<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>超市记账本</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #f0f2f5;
  color: #1a1a1a;
  min-height: 100vh;
  padding-bottom: 20px;
}
input, button, select { font-size: 16px; font-family: inherit; }

/* Header */
header {
  background: #1976D2;
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
header .gear {
  background: none; border: none; color: #fff; font-size: 22px;
  cursor: pointer; padding: 6px; border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
}
header .gear:active { background: rgba(255,255,255,.15); }

/* Tabs */
.tab-bar {
  display: flex; background: #fff; border-bottom: 1px solid #e0e0e0;
  position: sticky; top: 56px; z-index: 9;
}
.tab-bar button {
  flex: 1; padding: 12px; border: none; background: none;
  font-size: 16px; font-weight: 500; color: #666; cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .2s;
}
.tab-bar button.active { color: #1976D2; border-bottom-color: #1976D2; }
.tab-bar button:active { opacity: .7; }

/* Container */
.container { max-width: 720px; margin: 0 auto; padding: 12px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Card */
.card {
  background: #fff; border-radius: 12px; padding: 20px;
  margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #444; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 14px; color: #555; margin-bottom: 4px; font-weight: 500;
}
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0;
  border-radius: 8px; outline: none; transition: border-color .2s; background: #fff;
}
.form-group input:focus, .form-group select:focus { border-color: #1976D2; }
.form-group input[readonly] { background: #f5f5f5; color: #333; }
.form-group .hint { font-size: 12px; color: #888; margin-top: 2px; }

/* Row layout for inline fields */
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* Checkbox toggle */
.toggle-wrap { display: flex; align-items: center; gap: 10px; }
.toggle-wrap input[type="checkbox"] {
  width: 20px; height: 20px; cursor: pointer; accent-color: #1976D2;
}

/* Buttons */
.btn {
  padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px;
  font-weight: 500; cursor: pointer; transition: opacity .2s; display: inline-flex;
  align-items: center; justify-content: center; gap: 6px; min-height: 44px;
}
.btn:active { opacity: .7; }
.btn-primary { background: #1976D2; color: #fff; width: 100%; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-small { padding: 8px 16px; font-size: 14px; min-height: 36px; }
.btn-success { background: #2E7D32; color: #fff; }
.btn-outline { background: none; border: 1px solid #1976D2; color: #1976D2; }

/* Search controls */
.search-row { display: flex; gap: 8px; margin-bottom: 12px; }
.search-row input { flex: 1; padding: 10px 12px; border: 1px solid #d0d0d0;
  border-radius: 8px; outline: none; }
.search-row input:focus { border-color: #1976D2; }
.search-row .btn { flex-shrink: 0; padding: 10px 20px; }

/* Supermarket picker */
.name-picker { position: relative; }
.name-picker input { padding-right: 34px; }
.name-picker::after {
  content: "⌄"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: #777; pointer-events: none; font-size: 16px;
}
.name-dropdown {
  display: none; position: absolute; left: 0; right: 0; top: calc(100% + 4px);
  background: #fff; border: 1px solid #d7d7d7; border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.14); z-index: 60; overflow: hidden;
}
.name-dropdown.show { display: block; }
.name-dropdown-header {
  display: flex; gap: 8px; padding: 8px; border-bottom: 1px solid #eee; background: #f7f9fc;
}
.name-dropdown-header .btn { flex: 1; padding: 8px 10px; min-height: 34px; font-size: 13px; }
.name-options { max-height: 260px; overflow-y: auto; }
.name-option {
  width: 100%; border: none; background: #fff; display: flex; align-items: center;
  justify-content: space-between; gap: 8px; text-align: left; padding: 10px 8px;
  border-bottom: 1px solid #f1f1f1; cursor: pointer; color: #222;
}
.name-option:active, .name-option:hover { background: #eef5ff; }
.name-option span { white-space: normal; line-height: 1.35; }
.name-option-empty { color: #1976D2; font-weight: 600; }
.name-delete {
  border: 1px solid #ef9a9a; background: #fff; color: #c62828; border-radius: 6px;
  padding: 4px 8px; font-size: 12px; flex-shrink: 0; cursor: pointer;
}
.name-empty { padding: 14px; color: #999; font-size: 14px; text-align: center; }

/* Time range pills */
.pill-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.pill-group label {
  padding: 6px 14px; border: 1px solid #d0d0d0; border-radius: 20px;
  font-size: 14px; cursor: pointer; transition: all .2s; user-select: none;
  color: #555; background: #fff;
}
.pill-group input { display: none; }
.pill-group input:checked + label {
  background: #1976D2; color: #fff; border-color: #1976D2;
}

/* Custom date range */
.date-range { display: none; gap: 8px; align-items: center; margin-bottom: 12px; }
.date-range.show { display: flex; }
.date-range input { flex: 1; padding: 8px 10px; border: 1px solid #d0d0d0;
  border-radius: 8px; outline: none; }
.date-range input:focus { border-color: #1976D2; }
.date-range span { color: #888; font-size: 14px; }

/* Results */
.summary-bar { padding: 10px 14px; background: #e3f2fd; border-radius: 8px;
  font-size: 14px; color: #1565C0; margin-bottom: 12px; }
.result-toolbar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.result-toolbar .btn { width: auto; padding: 9px 14px; min-height: 38px; font-size: 14px; }

.result-section { margin-bottom: 16px; }
.result-section h3 {
  font-size: 15px; font-weight: 600; padding: 8px 0; margin-bottom: 8px;
  border-bottom: 2px solid #eee;
}
.result-section h3 .count { font-weight: 400; color: #888; font-size: 13px; }
.result-section h3 .badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 500; margin-left: 6px;
}
.result-section h3 .badge-unsettled { background: #fff3e0; color: #e65100; }
.result-section h3 .badge-settled { background: #e8f5e9; color: #2e7d32; }

/* Record card */
.record {
  border: 1px solid #eee; border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; transition: all .2s;
}
.record.unsettled { border-left: 4px solid #ff9800; }
.record.settled { border-left: 4px solid #4caf50; opacity: .85; }
.record-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.record-name { font-weight: 600; font-size: 15px; }
.record-date { color: #888; font-size: 13px; }
.record-body { display: flex; flex-wrap: wrap; gap: 6px 16px; font-size: 14px; color: #444; }
.record-body span { white-space: nowrap; }
.record-body .label { color: #888; }
.record-body .amount { font-weight: 600; }
.record-body .payable { color: #1976D2; }
.record-actions { margin-top: 8px; }

/* Status badges */
.status-badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 500;
}
.status-badge.settled { background: #e8f5e9; color: #2e7d32; }
.status-badge.unsettled { background: #fff3e0; color: #e65100; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: #999; font-size: 15px; }

/* Modal (settings) */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 16px; padding: 24px; width: 100%;
  max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,.2);
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal .form-group { margin-bottom: 12px; }
.modal .btn-row { display: flex; gap: 10px; margin-top: 16px; }
.modal .btn-row .btn { flex: 1; }
.modal .test-result { display: none; font-size: 14px; margin-top: 8px; padding: 8px 12px;
  border-radius: 8px; }
.modal .test-result.success { display: block; background: #e8f5e9; color: #2e7d32; }
.modal .test-result.fail { display: block; background: #fce4ec; color: #c62828; }

/* Connection status */
.conn-status {
  font-size: 12px; padding: 3px 10px; border-radius: 12px; margin-top: 4px;
  display: inline-block;
}
.conn-status.connected { background: rgba(255,255,255,.2); color: #e8f5e9; }
.conn-status.disconnected { background: rgba(255,255,255,.15); color: #ffcdd2; }

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #323232; color: #fff; padding: 12px 24px; border-radius: 8px;
  font-size: 14px; z-index: 200; opacity: 0; transition: opacity .3s;
  pointer-events: none; max-width: 90%; text-align: center;
}
.toast.show { opacity: 1; }

/* Settings link in header */
.header-left { display: flex; align-items: center; gap: 8px; }

/* Auto-calc display */
.auto-calc {
  font-size: 20px; font-weight: 700; color: #1976D2;
  padding: 6px 0;
}

/* Empty results hint */
.search-hint { text-align: center; padding: 20px; color: #999; font-size: 14px; }

@media (max-width: 480px) {
  header { padding: 12px 16px; }
  header h1 { font-size: 18px; }
  .tab-bar button { padding: 10px 8px; font-size: 15px; }
  .container { padding: 8px; }
  .card { padding: 14px; }
  .form-row { flex-direction: column; gap: 0; }
  .record-body { font-size: 13px; }
  .pill-group label { padding: 5px 12px; font-size: 13px; }
  .date-range { flex-wrap: wrap; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>超市记账本</h1>
    <span id="connStatus" class="conn-status disconnected">未连接</span>
  </div>
  <button class="gear" onclick="openSettings()" title="设置">&#9881;</button>
</header>

<!-- Tab Bar -->
<div class="tab-bar">
  <button id="tabRegister" class="active" onclick="switchTab('register')">登记</button>
  <button id="tabView" onclick="switchTab('view')">查看</button>
</div>

<div class="container">

<!-- ============ 登记 Tab ============ -->
<div id="panelRegister" class="tab-panel active">
  <div class="card">
    <div class="card-title">登记新账单</div>
    <div class="form-group">
      <label for="inputName">超市名字 *</label>
      <div class="name-picker">
        <input type="text" id="inputName" placeholder="点击选择或输入超市名称" autocomplete="off"
          onclick="openStoreDropdown('inputName')" onfocus="openStoreDropdown('inputName')" oninput="renderStoreDropdown('inputName')">
        <div class="name-dropdown" id="inputNameDropdown"></div>
      </div>
    </div>
    <div class="form-group">
      <label for="inputDate">日期</label>
      <input type="date" id="inputDate">
    </div>
    <div class="form-group">
      <label for="inputDeliveryPerson">送货人员名字</label>
      <div class="name-picker">
        <input type="text" id="inputDeliveryPerson" placeholder="点击选择或输入送货人员名字" autocomplete="off"
          onclick="openDeliveryDropdown('inputDeliveryPerson')" onfocus="openDeliveryDropdown('inputDeliveryPerson')" oninput="renderDeliveryDropdown('inputDeliveryPerson')">
        <div class="name-dropdown" id="inputDeliveryPersonDropdown"></div>
      </div>
    </div>
    <div class="form-group">
      <label for="inputPaymentMethod">结账方式</label>
      <select id="inputPaymentMethod">
        <option value="现金">现金</option>
        <option value="微信">微信</option>
        <option value="支付宝">支付宝</option>
        <option value="银行卡">银行卡</option>
        <option value="挂账">挂账</option>
        <option value="月对账">月对账</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="inputIncome">进项金额 *</label>
        <input type="number" id="inputIncome" min="0" step="0.01" placeholder="0.00" oninput="calcPayable()">
      </div>
      <div class="form-group">
        <label for="inputRefund">退项金额</label>
        <input type="number" id="inputRefund" min="0" step="0.01" placeholder="0.00" oninput="calcPayable()">
      </div>
    </div>
    <div class="form-group">
      <label>应付金额</label>
      <div class="auto-calc" id="displayPayable">¥0.00</div>
    </div>
    <div class="form-group">
      <div class="toggle-wrap">
        <input type="checkbox" id="inputSettled">
        <label for="inputSettled" style="margin:0;font-weight:400;">已结账（已收款）</label>
      </div>
    </div>
    <button class="btn btn-primary" id="btnSubmit" onclick="submitRecord()">提交保存</button>
  </div>
</div>

<!-- ============ 查看 Tab ============ -->
<div id="panelView" class="tab-panel">
  <div class="card">
    <div class="card-title">搜索账单</div>
    <div class="search-row">
      <div class="name-picker" style="flex:1;">
        <input type="text" id="searchName" placeholder="点击选择超市名字（留空查全部）" autocomplete="off"
          onclick="openStoreDropdown('searchName')" onfocus="openStoreDropdown('searchName')" oninput="renderStoreDropdown('searchName')">
        <div class="name-dropdown" id="searchNameDropdown"></div>
      </div>
      <button class="btn btn-primary" style="width:auto;padding:10px 20px;" onclick="searchRecords()">查询</button>
    </div>
    <div class="pill-group" id="timeRangeGroup">
      <input type="radio" name="timeRange" id="range1m" value="1m">
      <label for="range1m">近1个月</label>
      <input type="radio" name="timeRange" id="range2m" value="2m">
      <label for="range2m">近2个月</label>
      <input type="radio" name="timeRange" id="range3m" value="3m" checked>
      <label for="range3m">近3个月</label>
      <input type="radio" name="timeRange" id="range6m" value="6m">
      <label for="range6m">近半年</label>
      <input type="radio" name="timeRange" id="rangeCustom" value="custom">
      <label for="rangeCustom">自定义</label>
    </div>
    <div class="date-range" id="customDateRange">
      <input type="date" id="startDate">
      <span>至</span>
      <input type="date" id="endDate">
    </div>
  </div>

  <!-- Results -->
  <div id="resultsArea" style="display:none;">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="result-toolbar">
      <button class="btn btn-outline" id="downloadResultsBtn" onclick="downloadCurrentResults()">下载当前查询数据</button>
    </div>
    <div id="resultSections"></div>
  </div>
  <div id="noResults" class="search-hint" style="display:none;">暂无数据，请先登记账单</div>
</div>

</div>

<!-- ============ 设置 Modal ============ -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>云端设置</h2>
    <p style="font-size:13px;color:#888;margin-bottom:14px;">
      使用 Supabase 云端存储，手机和电脑可同步数据。
    </p>
    <div class="form-group">
      <label>项目地址 (URL)</label>
      <input type="url" id="supabaseUrl" placeholder="https://xxx.supabase.co">
    </div>
    <div class="form-group">
      <label>匿名密钥 (anon public key)</label>
      <input type="text" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIs...">
    </div>
    <div id="testResult" class="test-result"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="testConnection()">测试连接</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid #eee;">
      <button class="btn btn-outline" style="width:100%;color:#c62828;border-color:#ef9a9a;" onclick="clearSettings()">断开连接</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="supermarket_names.js"></script>
<script src="delivery_person_names.js"></script>
<script>
// ========== Config ==========
const DEFAULT_SUPABASE_CONFIG = {
  url: 'https://tdvfftsapcezcsbhpbwu.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkdmZmdHNhcGNlemNzYmhwYnd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMzU3OTYsImV4cCI6MjA5NDcxMTc5Nn0.hjfK8jlafYQHqnAwKXRaxadldrhizrNne2WkkJVrsfE'
};

function getConfig() {
  if (localStorage.getItem('smb_supabase_disabled') === '1') return null;
  try { return JSON.parse(localStorage.getItem('smb_supabase_config') || 'null') || DEFAULT_SUPABASE_CONFIG; }
  catch { return DEFAULT_SUPABASE_CONFIG; }
}
function normalizeSupabaseUrl(url) {
  return (url || '').trim().replace(/\/+$/, '').replace(/\/rest\/v1$/i, '');
}
function restUrl(cfg, path) {
  return normalizeSupabaseUrl(cfg.url) + '/rest/v1/' + path.replace(/^\/+/, '');
}
function supabaseHeaders(cfg, extra, isWrite) {
  const headers = Object.assign({
    'apikey': cfg.key,
    'Authorization': 'Bearer ' + cfg.key,
    'Accept-Profile': 'public'
  }, extra || {});
  if (isWrite) headers['Content-Profile'] = 'public';
  return headers;
}

function isMissingLedgerColumnsError(text) {
  return String(text || '').includes('delivery_person') || String(text || '').includes('payment_method');
}
function setConfig(url, key) {
  localStorage.removeItem('smb_supabase_disabled');
  localStorage.setItem('smb_supabase_config', JSON.stringify({ url: normalizeSupabaseUrl(url), key: key.trim() }));
}
function clearConfig() {
  localStorage.setItem('smb_supabase_disabled', '1');
  localStorage.removeItem('smb_supabase_config');
  updateConnStatus();
}

function updateConnStatus() {
  const cfg = getConfig();
  const el = document.getElementById('connStatus');
  if (cfg) {
    el.textContent = '已连接';
    el.className = 'conn-status connected';
  } else {
    el.textContent = '未连接';
    el.className = 'conn-status disconnected';
  }
}

// ========== Toast ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ========== Supermarket Names ==========
const STORE_NAMES_KEY = 'smb_supermarket_names_v1';
const BUILTIN_SUPERMARKET_NAMES = Array.isArray(window.DEFAULT_SUPERMARKET_NAMES)
  ? window.DEFAULT_SUPERMARKET_NAMES : [];

function normalizeStoreName(name) {
  return (name || '').replace(/\s+/g, ' ').trim();
}

function uniqueStoreNames(names) {
  const seen = new Set();
  const clean = [];
  (names || []).forEach(name => {
    const n = normalizeStoreName(name);
    const key = n.toLowerCase();
    if (n && !seen.has(key)) {
      seen.add(key);
      clean.push(n);
    }
  });
  return clean;
}

function ensureSupermarketNames() {
  const saved = localStorage.getItem(STORE_NAMES_KEY);
  if (!saved) {
    saveStoreNames(BUILTIN_SUPERMARKET_NAMES);
    return;
  }
  try {
    const names = uniqueStoreNames(JSON.parse(saved || '[]'));
    if (names.length === 0 && BUILTIN_SUPERMARKET_NAMES.length > 0) {
      saveStoreNames(BUILTIN_SUPERMARKET_NAMES);
    }
  } catch {
    saveStoreNames(BUILTIN_SUPERMARKET_NAMES);
  }
}

function getStoreNames() {
  ensureSupermarketNames();
  try {
    return uniqueStoreNames(JSON.parse(localStorage.getItem(STORE_NAMES_KEY) || '[]'));
  } catch {
    return uniqueStoreNames(BUILTIN_SUPERMARKET_NAMES);
  }
}

function saveStoreNames(names) {
  localStorage.setItem(STORE_NAMES_KEY, JSON.stringify(uniqueStoreNames(names)));
}

function addStoreName(name) {
  const clean = normalizeStoreName(name);
  if (!clean) return false;
  const names = getStoreNames();
  if (!names.some(item => item.toLowerCase() === clean.toLowerCase())) {
    names.unshift(clean);
    saveStoreNames(names);
    return true;
  }
  return false;
}

function addStoreNameFromInput(inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const added = addStoreName(input.value);
  renderStoreDropdown(inputId);
  showToast(added ? '超市名字已添加' : '这个超市名字已经在列表里');
}

function deleteStoreName(name, inputId) {
  if (!confirm('确认删除这个超市名字吗？\n' + name)) return;
  const target = normalizeStoreName(name).toLowerCase();
  const names = getStoreNames().filter(item => item.toLowerCase() !== target);
  saveStoreNames(names);
  renderStoreDropdown(inputId);
  showToast('已删除超市名字');
}

function openStoreDropdown(inputId) {
  document.querySelectorAll('.name-dropdown').forEach(el => el.classList.remove('show'));
  renderStoreDropdown(inputId);
  const dropdown = document.getElementById(inputId + 'Dropdown');
  if (dropdown) dropdown.classList.add('show');
}

function closeStoreDropdowns() {

// ========== Delivery Person Names ==========
const DELIVERY_PERSON_NAMES_KEY = 'smb_delivery_person_names_v1';
const BUILTIN_DELIVERY_PERSON_NAMES = Array.isArray(window.DEFAULT_DELIVERY_PERSON_NAMES)
  ? window.DEFAULT_DELIVERY_PERSON_NAMES : [];

function normalizeDeliveryPersonName(name) {
  return (name || '').replace(/\s+/g, ' ').trim();
}

function uniqueDeliveryPersonNames(names) {
  const seen = new Set();
  const clean = [];
  (names || []).forEach(name => {
    const n = normalizeDeliveryPersonName(name);
    const key = n.toLowerCase();
    if (n && !seen.has(key)) {
      seen.add(key);
      clean.push(n);
    }
  });
  return clean;
}

function ensureDeliveryPersonNames() {
  const saved = localStorage.getItem(DELIVERY_PERSON_NAMES_KEY);
  if (!saved) {
    saveDeliveryPersonNames(BUILTIN_DELIVERY_PERSON_NAMES);
    return;
  }
  try {
    const names = uniqueDeliveryPersonNames(JSON.parse(saved || '[]'));
    if (names.length === 0 && BUILTIN_DELIVERY_PERSON_NAMES.length > 0) {
      saveDeliveryPersonNames(BUILTIN_DELIVERY_PERSON_NAMES);
    }
  } catch {
    saveDeliveryPersonNames(BUILTIN_DELIVERY_PERSON_NAMES);
  }
}

function getDeliveryPersonNames() {
  ensureDeliveryPersonNames();
  try {
    return uniqueDeliveryPersonNames(JSON.parse(localStorage.getItem(DELIVERY_PERSON_NAMES_KEY) || '[]'));
  } catch {
    return uniqueDeliveryPersonNames(BUILTIN_DELIVERY_PERSON_NAMES);
  }
}

function saveDeliveryPersonNames(names) {
  localStorage.setItem(DELIVERY_PERSON_NAMES_KEY, JSON.stringify(uniqueDeliveryPersonNames(names)));
}

function addDeliveryPersonName(name) {
  const clean = normalizeDeliveryPersonName(name);
  if (!clean) return false;
  const names = getDeliveryPersonNames();
  if (!names.some(item => item.toLowerCase() === clean.toLowerCase())) {
    names.unshift(clean);
    saveDeliveryPersonNames(names);
    return true;
  }
  return false;
}

function addDeliveryPersonNameFromInput(inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const added = addDeliveryPersonName(input.value);

  showToast(added ? '送货人员名字已添加' : '这个送货人员名字已经在列表里');

function deleteDeliveryPersonName(name, inputId) {

  const target = normalizeDeliveryPersonName(name).toLowerCase();
  const names = getDeliveryPersonNames().filter(item => item.toLowerCase() !== target);
  saveDeliveryPersonNames(names);

// ========== Date Utils ==========
function todayStr() { return new Date().toISOString().slice(0,10); }

function addMonths(d, n) {
  const r = new Date(d);
  r.setMonth(r.getMonth() + n);
  if (r.getDate() !== d.getDate()) r.setDate(0); // handle month overflow
  return r;
}

function formatDate(d) { return d.toISOString().slice(0,10); }

// ========== Tab Switching ==========
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(el => el.classList.remove('active'));
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (name === 'view') autoSearch();
}

function initDate() {
  document.getElementById('inputDate').value = todayStr();
}

function calcPayable() {
  const income = parseFloat(document.getElementById('inputIncome').value) || 0;
  const refund = parseFloat(document.getElementById('inputRefund').value) || 0;
  const payable = Math.max(0, income - refund);
  document.getElementById('displayPayable').textContent = '¥' + payable.toFixed(2);
}

async function submitRecord() {
  const cfg = getConfig();
  if (!cfg) { showToast('请先设置云端连接'); openSettings(); return; }

  const name = document.getElementById('inputName').value.trim();
  const date = document.getElementById('inputDate').value;
  const deliveryPerson = document.getElementById('inputDeliveryPerson').value.trim();
  const paymentMethod = document.getElementById('inputPaymentMethod').value;
  const income = parseFloat(document.getElementById('inputIncome').value) || 0;
  const refund = parseFloat(document.getElementById('inputRefund').value) || 0;
  const settled = document.getElementById('inputSettled').checked;
  const payable = Math.max(0, income - refund);

  if (!name) { showToast('请输入超市名字'); document.getElementById('inputName').focus(); return; }
  if (!date) { showToast('请选择日期'); return; }
  if (income <= 0) { showToast('请输入进项金额'); document.getElementById('inputIncome').focus(); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = '保存中...';

  try {
    const res = await fetch(restUrl(cfg, 'supermarket_bills'), {
      method: 'POST',
      headers: supabaseHeaders(cfg, { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, true),
      body: JSON.stringify({
        supermarket_name: name, bill_date: date,
        delivery_person: deliveryPerson || null,
        payment_method: paymentMethod,
        income_amount: income, refund_amount: refund,
        payable_amount: payable, settled: settled
      })
    });
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      if (isMissingLedgerColumnsError(errText)) {
        throw new Error('云端表缺少送货人员或结账方式字段，请先执行最新建表 SQL');
      }
      throw new Error('提交失败 (' + res.status + ')');
    }
    addStoreName(name);
    if (deliveryPerson) addDeliveryPersonName(deliveryPerson);
    showToast('保存成功');

    // Reset form
    document.getElementById('inputName').value = '';
    document.getElementById('inputDeliveryPerson').value = '';
    document.getElementById('inputPaymentMethod').value = '现金';
    document.getElementById('inputIncome').value = '';
    document.getElementById('inputRefund').value = '';
    document.getElementById('inputSettled').checked = false;
    calcPayable();
    document.getElementById('inputName').focus();
  } catch (e) {
    showToast(e.message || '保存失败，请检查网络');
  } finally {
    btn.disabled = false; btn.textContent = '提交保存';
  }
}

// ========== View / Search ==========
let lastSearchPromise = null;
let currentResultsData = [];
let currentResultsMeta = null;

function getDateRange() {
  const val = document.querySelector('input[name="timeRange"]:checked').value;
  const today = new Date();
  const end = todayStr();

  if (val === 'custom') {
    const s = document.getElementById('startDate').value;
    const e = document.getElementById('endDate').value;
    if (!s || !e) return null;
    return { start: s, end: e };
  }

  const months = { '1m': 1, '2m': 2, '3m': 3, '6m': 6 };
  const start = formatDate(addMonths(today, -months[val]));
  return { start, end };
}

// Time range pill change handler
document.querySelectorAll('input[name="timeRange"]').forEach(el => {
  el.addEventListener('change', function() {
    const custom = document.getElementById('customDateRange');
    if (this.value === 'custom') {
      custom.classList.add('show');
      if (!document.getElementById('startDate').value) {
        const d = addMonths(new Date(), -3);
        document.getElementById('startDate').value = formatDate(d);
      }
      if (!document.getElementById('endDate').value) {
        document.getElementById('endDate').value = todayStr();
      }
    } else {
      custom.classList.remove('show');
    }
  });
});

async function searchRecords() {
  const cfg = getConfig();
  if (!cfg) { showToast('请先设置云端连接'); openSettings(); return; }

  const name = document.getElementById('searchName').value.trim();
  const range = getDateRange();
  if (!range) { showToast('请选择日期范围'); return; }

  const resultsArea = document.getElementById('resultsArea');
  const noResults = document.getElementById('noResults');
  resultsArea.style.display = 'none';
  noResults.style.display = 'none';
  document.getElementById('resultSections').innerHTML = '';
  currentResultsData = [];
  currentResultsMeta = null;

  // Build URL
  let url = restUrl(cfg, 'supermarket_bills?select=*&order=settled.asc,bill_date.asc');

  const params = [];
  if (name) params.push('supermarket_name=ilike.*' + encodeURIComponent(name) + '*');
  params.push('bill_date=gte.' + range.start);
  params.push('bill_date=lte.' + range.end);

  const searchUrl = url + '&' + params.join('&');

  const currentSearch = Symbol();
  lastSearchPromise = currentSearch;

  try {
    const res = await fetch(searchUrl, {
      headers: supabaseHeaders(cfg)
    });
    if (!res.ok) throw new Error('查询失败 (' + res.status + ')');
    const data = await res.json();

    // Check if this search is still relevant
    if (lastSearchPromise !== currentSearch) return;

    if (!data || data.length === 0) {
      noResults.style.display = 'block';
      return;
    }

    currentResultsData = data;
    currentResultsMeta = { label: name || '全部超市', range };
    renderResults(data, name || '全部超市');
    resultsArea.style.display = 'block';
  } catch (e) {
    if (lastSearchPromise === currentSearch) {
      showToast(e.message || '查询失败');
    }
  }
}

function renderResults(data, searchLabel) {
  const unsettled = data.filter(r => !r.settled);
  const settled = data.filter(r => r.settled);

  document.getElementById('summaryBar').textContent =
    '共 ' + data.length + ' 条记录' +
    '（未结账 ' + unsettled.length + '，已结账 ' + settled.length + '）| ' + searchLabel;

  let html = '';
  html += renderSection('未结账', unsettled, false);
  html += renderSection('已结账', settled, true);
  document.getElementById('resultSections').innerHTML = html;
}

function renderSection(title, records, settled) {
  if (records.length === 0) return '';
  const badgeClass = settled ? 'badge-settled' : 'badge-unsettled';
  const badgeText = settled ? '已结账' : '未结账';

  let html = '<div class="result-section">';
  html += '<h3>' + title + ' <span class="count">(' + records.length + ')</span>' +
    '<span class="badge ' + badgeClass + '">' + badgeText + '</span></h3>';

  records.forEach(r => {
    const d = r.bill_date ? r.bill_date.slice(0,10) : '';
    html += '<div class="record ' + (settled ? 'settled' : 'unsettled') + '">';
    html += '<div class="record-header">';
    html += '<span class="record-name">' + escHtml(r.supermarket_name) + '</span>';
    html += '<span class="record-date">' + d + '</span>';
    html += '</div>';
    html += '<div class="record-body">';
    html += '<span><span class="label">送货人员</span> ' + escHtml(r.delivery_person || '-') + '</span>';
    html += '<span><span class="label">结账方式</span> ' + escHtml(r.payment_method || '-') + '</span>';
    html += '<span><span class="label">进项</span> <span class="amount">¥' + fmt(r.income_amount) + '</span></span>';
    html += '<span><span class="label">退项</span> ¥' + fmt(r.refund_amount) + '</span>';
    html += '<span><span class="label">应付</span> <span class="amount payable">¥' + fmt(r.payable_amount) + '</span></span>';
    html += '<span><span class="label">状态</span> ' +
      (settled
        ? '<span class="status-badge settled">已结账</span>'
        : '<span class="status-badge unsettled">未结账</span>') +
      '</span>';
    html += '</div>';
    if (!settled) {
      html += '<div class="record-actions">';
      html += '<button class="btn btn-small btn-success" onclick="markSettled(' + r.id + ')">标记为已结账</button>';
      html += '</div>';
    }
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmt(v) {
  const n = parseFloat(v) || 0;
  return n.toFixed(2);
}

function downloadCurrentResults() {
  if (!currentResultsData || currentResultsData.length === 0) {
    showToast('当前没有可下载的数据');
    return;
  }

  const meta = currentResultsMeta || { label: '查询结果', range: getDateRange() || {} };
  const totalIncome = currentResultsData.reduce((sum, r) => sum + (parseFloat(r.income_amount) || 0), 0);
  const totalRefund = currentResultsData.reduce((sum, r) => sum + (parseFloat(r.refund_amount) || 0), 0);
  const totalPayable = currentResultsData.reduce((sum, r) => sum + (parseFloat(r.payable_amount) || 0), 0);

  const rows = currentResultsData.map((r, index) => [
    index + 1,
    r.bill_date ? String(r.bill_date).slice(0, 10) : '',
    r.supermarket_name || '',
    r.delivery_person || '',
    r.payment_method || '',
    r.settled ? '已结账' : '未结账',
    fmt(r.income_amount),
    fmt(r.refund_amount),
    fmt(r.payable_amount)
  ]);

  const title = '超市账单查询结果';
  const rangeText = (meta.range && meta.range.start ? meta.range.start : '') +
    ' 至 ' + (meta.range && meta.range.end ? meta.range.end : '');
  let html = '<html><head><meta charset="UTF-8"></head><body>';
  html += '<table border="1">';
  html += '<tr><th colspan="9" style="font-size:18px;">' + escHtml(title) + '</th></tr>';
  html += '<tr><td colspan="9">超市：' + escHtml(meta.label || '') + '</td></tr>';
  html += '<tr><td colspan="9">日期范围：' + escHtml(rangeText) + '</td></tr>';
  html += '<tr><td colspan="9">导出时间：' + escHtml(new Date().toLocaleString()) + '</td></tr>';
  html += '<tr style="font-weight:bold;background:#e3f2fd;"><th>序号</th><th>日期</th><th>超市名字</th><th>送货人员</th><th>结账方式</th><th>状态</th><th>进项金额</th><th>退项金额</th><th>应付金额</th></tr>';
  rows.forEach(row => {
    html += '<tr>' + row.map(cell => '<td>' + escHtml(cell) + '</td>').join('') + '</tr>';
  });
  html += '<tr style="font-weight:bold;background:#f5f5f5;"><td colspan="6">合计</td><td>' +
    fmt(totalIncome) + '</td><td>' + fmt(totalRefund) + '</td><td>' + fmt(totalPayable) + '</td></tr>';
  html += '</table></body></html>';

  const blob = new Blob(['\ufeff', html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
  const link = document.createElement('a');
  const fileLabel = safeFileName(meta.label || '全部超市');
  const fileRange = safeFileName((meta.range && meta.range.start ? meta.range.start : '') + '_' + (meta.range && meta.range.end ? meta.range.end : ''));
  link.href = URL.createObjectURL(blob);
  link.download = '超市账单_' + fileLabel + '_' + fileRange + '.xls';
  document.body.appendChild(link);
  link.click();
  setTimeout(() => {
    URL.revokeObjectURL(link.href);
    link.remove();
  }, 0);
}

function safeFileName(text) {
  return String(text || '').replace(/[\\/:*?"<>|]+/g, '_').replace(/\s+/g, '_').slice(0, 60);
}

async function markSettled(id) {
  if (!confirm('确认将此账单标记为已结账？')) return;

  const cfg = getConfig();
  if (!cfg) { showToast('连接已断开'); return; }

  try {
    const res = await fetch(restUrl(cfg, 'supermarket_bills?id=eq.' + id), {
      method: 'PATCH',
      headers: supabaseHeaders(cfg, { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, true),
      body: JSON.stringify({ settled: true, updated_at: new Date().toISOString() })
    });
    if (!res.ok) throw new Error('更新失败 (' + res.status + ')');
    showToast('已标记为结账');
    searchRecords(); // refresh
  } catch (e) {
    showToast(e.message || '更新失败');
  }
}

}

async function testConnection() {
  const url = normalizeSupabaseUrl(document.getElementById('supabaseUrl').value);
  const key = document.getElementById('supabaseKey').value.trim();
  const el = document.getElementById('testResult');

  if (!url || !key) { el.className = 'test-result fail'; el.textContent = '请填写项目地址和密钥'; return; }

  el.className = 'test-result'; el.textContent = '测试中...'; el.style.display = 'block';

  try {
    const testCfg = { url, key };
    const res = await fetch(restUrl(testCfg, 'supermarket_bills?select=count'), {
      headers: supabaseHeaders(testCfg)
    });
    if (res.ok) {
      const schemaRes = await fetch(restUrl(testCfg, 'supermarket_bills?select=id,delivery_person,payment_method&limit=1'), {
        headers: supabaseHeaders(testCfg)
      });
      if (schemaRes.ok) {
        el.className = 'test-result success'; el.textContent = '连接成功！';
      } else {
        const schemaText = await schemaRes.text().catch(() => '');
        if (isMissingLedgerColumnsError(schemaText)) {
          el.className = 'test-result fail';
          el.textContent = '连接成功，但表缺少送货人员或结账方式字段，请先执行最新补列 SQL';
        } else {
          el.className = 'test-result fail';
          el.textContent = '连接成功，但字段检查失败 (' + schemaRes.status + ')';
        }
      }
    } else if (res.status === 404) {
      el.className = 'test-result fail';
      el.textContent = '连接成功，但 supermarket_bills 表不存在，请先执行建表 SQL';
    } else if (res.status === 401 || res.status === 403) {
      el.className = 'test-result fail'; el.textContent = '认证失败，请检查密钥是否正确';
    } else {
      el.className = 'test-result fail'; el.textContent = '连接失败 (' + res.status + ')，请检查地址';
    }
  } catch (e) {
    el.className = 'test-result fail'; el.textContent = '无法连接到服务器，请检查地址和网络';
  }
}

function saveSettings() {
  const url = normalizeSupabaseUrl(document.getElementById('supabaseUrl').value);
  const key = document.getElementById('supabaseKey').value.trim();
  if (!url || !key) { showToast('请填写项目地址和密钥'); return; }

  // Test first if not tested yet
  const el = document.getElementById('testResult');
  if (!el.classList.contains('success')) {
    testConnection();
    // We'll save on the next attempt; but allow save even without test
  }

  setConfig(url, key);
  updateConnStatus();
  closeSettings();
  showToast('配置已保存');
  autoSearch();
}

function clearSettings() {
  if (!confirm('确定断开云端连接？本地数据不受影响。')) return;
  clearConfig();
  closeSettings();
  document.getElementById('resultsArea').style.display = 'none';
  document.getElementById('noResults').style.display = 'none';
  showToast('已断开连接');
}

// ========== Init ==========
ensureSupermarketNames();
ensureDeliveryPersonNames();
initDate();
calcPayable();
updateConnStatus();

// Auto search on load if configured
const cfg = getConfig();
if (cfg) {
  // Test if table is accessible
  fetch(restUrl(cfg, 'supermarket_bills?select=count'), {
    headers: supabaseHeaders(cfg)
  }).then(res => {
    if (res.ok) updateConnStatus();
  }).catch(() => {});
}
</script>
</body>
